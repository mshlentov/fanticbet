basePath: /api/v1
definitions:
  handler.adjustRequest:
    properties:
      amount:
        type: integer
      reason:
        type: string
    required:
    - amount
    - reason
    type: object
  handler.adjustResponse:
    properties:
      balance:
        type: integer
    type: object
  handler.adminLeagueDTO:
    properties:
      created_at:
        type: string
      id:
        type: integer
      name:
        type: string
      sport_slug:
        type: string
      updated_at:
        type: string
    type: object
  handler.adminLeaguesResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/handler.adminLeagueDTO'
        type: array
    type: object
  handler.adminMarketDTO:
    properties:
      id:
        type: integer
      outcomes:
        items:
          $ref: '#/definitions/handler.adminOutcomeDTO'
        type: array
      question:
        type: string
      status:
        type: string
      type:
        type: string
    type: object
  handler.adminOutcomeDTO:
    properties:
      code:
        type: string
      id:
        type: integer
      label:
        type: string
      odds:
        type: number
    type: object
  handler.betDTO:
    properties:
      created_at:
        type: string
      event_away:
        type: string
      event_home:
        type: string
      event_id:
        type: integer
      event_title:
        type: string
      id:
        type: integer
      market_type:
        type: string
      odds:
        type: number
      outcome_id:
        type: integer
      outcome_label:
        type: string
      potential_payout:
        type: integer
      settled_at:
        type: string
      stake:
        type: integer
      status:
        type: string
    type: object
  handler.betsResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/handler.betDTO'
        type: array
      page:
        type: integer
    type: object
  handler.createEventRequest:
    properties:
      market:
        $ref: '#/definitions/handler.createMarketDTO'
      starts_at:
        type: string
      title:
        type: string
    required:
    - market
    - starts_at
    - title
    type: object
  handler.createEventResponse:
    properties:
      id:
        type: integer
      market:
        $ref: '#/definitions/handler.adminMarketDTO'
      source:
        type: string
      starts_at:
        type: string
      status:
        type: string
      title:
        type: string
    type: object
  handler.createLeagueRequest:
    properties:
      name:
        type: string
      sport_slug:
        type: string
    required:
    - name
    - sport_slug
    type: object
  handler.createMarketDTO:
    properties:
      outcomes:
        items:
          $ref: '#/definitions/handler.createOutcomeDTO'
        type: array
      question:
        type: string
    required:
    - outcomes
    type: object
  handler.createMatchRequest:
    properties:
      away:
        type: string
      home:
        type: string
      league_id:
        minimum: 1
        type: integer
      markets:
        items:
          $ref: '#/definitions/handler.matchMarketDTO'
        type: array
      starts_at:
        type: string
      title:
        type: string
    required:
    - away
    - home
    - league_id
    - markets
    - starts_at
    - title
    type: object
  handler.createOutcomeDTO:
    properties:
      label:
        type: string
      odds:
        type: string
    required:
    - label
    - odds
    type: object
  handler.editEventRequest:
    properties:
      outcomes:
        items:
          $ref: '#/definitions/handler.editOutcomeDTO'
        type: array
      question:
        type: string
      starts_at:
        type: string
      status:
        description: 'единственное допустимое значение: "cancelled"'
        type: string
      title:
        type: string
    type: object
  handler.editLeagueRequest:
    properties:
      name:
        type: string
      sport_slug:
        type: string
    type: object
  handler.editMatchOutcomeDTO:
    properties:
      id:
        minimum: 1
        type: integer
      odds:
        type: string
    required:
    - id
    type: object
  handler.editMatchRequest:
    properties:
      away:
        type: string
      home:
        type: string
      league_id:
        type: integer
      outcomes:
        items:
          $ref: '#/definitions/handler.editMatchOutcomeDTO'
        type: array
      starts_at:
        type: string
      status:
        description: 'единственное допустимое значение: "cancelled"'
        type: string
      title:
        type: string
    type: object
  handler.editOutcomeDTO:
    properties:
      id:
        minimum: 1
        type: integer
      label:
        type: string
      odds:
        type: string
    required:
    - id
    type: object
  handler.errorBody:
    properties:
      code:
        example: validation_error
        type: string
      message:
        example: Неверные данные запроса
        type: string
    type: object
  handler.errorResponse:
    properties:
      error:
        $ref: '#/definitions/handler.errorBody'
    type: object
  handler.eventDTO:
    properties:
      away:
        type: string
      home:
        type: string
      id:
        type: integer
      is_featured:
        description: computed из featured_at != null (для бейджа/секции)
        type: boolean
      league_name:
        type: string
      markets:
        items:
          $ref: '#/definitions/handler.marketDTO'
        type: array
      source:
        type: string
      sport_slug:
        type: string
      starts_at:
        type: string
      status:
        type: string
      title:
        type: string
    type: object
  handler.eventsResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/handler.eventDTO'
        type: array
      page:
        type: integer
    type: object
  handler.leaderboardResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/handler.leaderboardRowDTO'
        type: array
      page:
        type: integer
    type: object
  handler.leaderboardRowDTO:
    properties:
      avatar_url:
        type: string
      display_name:
        type: string
      profit:
        type: integer
      roi:
        type: number
      staked:
        type: integer
      total_bets:
        type: integer
      user_id:
        type: integer
      won_bets:
        type: integer
    type: object
  handler.leagueDTO:
    properties:
      id:
        type: integer
      name:
        type: string
      sport_slug:
        type: string
    type: object
  handler.leaguesResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/handler.leagueDTO'
        type: array
    type: object
  handler.loginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  handler.marketDTO:
    properties:
      id:
        type: integer
      line:
        type: number
      outcomes:
        items:
          $ref: '#/definitions/handler.outcomeDTO'
        type: array
      question:
        type: string
      status:
        type: string
      type:
        type: string
    type: object
  handler.matchMarketDTO:
    properties:
      line:
        description: NUMERIC(6,2) строкой; только для TOTALS
        type: string
      outcomes:
        items:
          $ref: '#/definitions/handler.matchOutcomeDTO'
        type: array
      type:
        type: string
    required:
    - outcomes
    - type
    type: object
  handler.matchOutcomeDTO:
    properties:
      code:
        type: string
      label:
        type: string
      odds:
        type: string
    required:
    - code
    - label
    - odds
    type: object
  handler.matchScoresRequest:
    properties:
      away:
        minimum: 0
        type: integer
      home:
        minimum: 0
        type: integer
    type: object
  handler.matchStatusRequest:
    properties:
      status:
        type: string
    required:
    - status
    type: object
  handler.meResponse:
    properties:
      balance:
        type: integer
      user:
        $ref: '#/definitions/handler.userDTO'
    type: object
  handler.outcomeDTO:
    properties:
      code:
        type: string
      id:
        type: integer
      label:
        type: string
      odds:
        type: number
      result:
        type: string
    type: object
  handler.placeBetRequest:
    properties:
      outcome_id:
        minimum: 1
        type: integer
      stake:
        minimum: 1
        type: integer
    required:
    - outcome_id
    - stake
    type: object
  handler.placeBetResponse:
    properties:
      balance:
        type: integer
      bet:
        $ref: '#/definitions/handler.betDTO'
    type: object
  handler.publicProfileDTO:
    properties:
      avatar_url:
        type: string
      created_at:
        type: string
      display_name:
        type: string
      id:
        type: integer
      stats:
        $ref: '#/definitions/handler.userStatsDTO'
    type: object
  handler.refreshRequest:
    properties:
      refresh_token:
        type: string
    type: object
  handler.registerRequest:
    properties:
      display_name:
        minLength: 2
        type: string
      email:
        type: string
      password:
        minLength: 8
        type: string
    required:
    - display_name
    - email
    - password
    type: object
  handler.setFeaturedRequest:
    properties:
      featured:
        type: boolean
    required:
    - featured
    type: object
  handler.settleRequest:
    properties:
      winning_outcome_id:
        minimum: 1
        type: integer
    required:
    - winning_outcome_id
    type: object
  handler.sportsResponse:
    properties:
      sports:
        items:
          type: string
        type: array
    type: object
  handler.tokenResponse:
    properties:
      access_token:
        type: string
      expires_in:
        description: секунды до истечения access-токена
        type: integer
      token_type:
        type: string
    type: object
  handler.transactionResponse:
    properties:
      amount:
        type: integer
      balance_after:
        type: integer
      bet_id:
        type: integer
      created_at:
        type: string
      id:
        type: integer
      type:
        type: string
    type: object
  handler.transactionsResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/handler.transactionResponse'
        type: array
      page:
        type: integer
    type: object
  handler.updateProfileRequest:
    properties:
      avatar_url:
        type: string
      display_name:
        description: 'Указатели + omitempty: отсутствующее поле = nil = «не менять».'
        minLength: 2
        type: string
    type: object
  handler.userBetsResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/handler.betDTO'
        type: array
      page:
        type: integer
    type: object
  handler.userDTO:
    properties:
      avatar_url:
        type: string
      created_at:
        type: string
      display_name:
        type: string
      email:
        type: string
      id:
        type: integer
      last_login_at:
        type: string
      role:
        type: string
    type: object
  handler.userStatsDTO:
    properties:
      lost_bets:
        type: integer
      pending_bets:
        type: integer
      profit:
        type: integer
      roi:
        type: number
      staked:
        type: integer
      total_bets:
        type: integer
      void_bets:
        type: integer
      win_rate:
        type: number
      won_bets:
        type: integer
    type: object
info:
  contact: {}
  description: REST API платформы ставок на фантики. На текущем этапе (M1) реализованы
    аутентификация и профиль пользователя.
  title: FanticBet API
  version: "1.0"
paths:
  /admin/events:
    post:
      consumes:
      - application/json
      description: Создаёт кастомное событие (source='custom') с одним CUSTOM-рынком
        и исходами в одной транзакции.
      parameters:
      - description: Параметры события
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.createEventRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/handler.createEventResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.errorResponse'
      security:
      - BearerAuth: []
      summary: Создать кастомное событие
      tags:
      - admin
  /admin/events/{id}:
    patch:
      consumes:
      - application/json
      description: Правит title/starts_at/question/коэффициенты исходов или отменяет
        событие (status='cancelled' → void ставок). Только для source='custom', status='upcoming'.
      parameters:
      - description: ID события
        in: path
        name: id
        required: true
        type: integer
      - description: Поля для обновления
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.editEventRequest'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.errorResponse'
      security:
      - BearerAuth: []
      summary: Редактировать кастомное событие
      tags:
      - admin
  /admin/events/{id}/featured:
    post:
      consumes:
      - application/json
      description: Помечает событие как «популярное» (featured=true) или снимает метку
        (featured=false). Работает для любого источника события.
      parameters:
      - description: ID события
        in: path
        name: id
        required: true
        type: integer
      - description: Флаг популярности
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.setFeaturedRequest'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.errorResponse'
      security:
      - BearerAuth: []
      summary: Управление популярностью события
      tags:
      - admin
  /admin/events/{id}/settle:
    post:
      consumes:
      - application/json
      description: 'Рассчитывает кастомное событие по выбранному победившему исходу:
        выигрыш — выплата, проигрыш — списание, рынок → settled.'
      parameters:
      - description: ID события
        in: path
        name: id
        required: true
        type: integer
      - description: ID победившего исхода
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.settleRequest'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.errorResponse'
      security:
      - BearerAuth: []
      summary: Рассчитать кастомное событие
      tags:
      - admin
  /admin/leagues:
    get:
      description: Список чемпионатов (лиг). Параметр sport_slug опционален.
      parameters:
      - description: Фильтр по виду спорта (sport_slug)
        in: query
        name: sport_slug
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.adminLeaguesResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.errorResponse'
      security:
      - BearerAuth: []
      summary: Список чемпионатов
      tags:
      - admin
    post:
      consumes:
      - application/json
      description: 'Создаёт чемпионат (лигу): {name, sport_slug}. Дубликаты (name,
        sport_slug) допустимы — различаются по id.'
      parameters:
      - description: Параметры чемпионата
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.createLeagueRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/handler.adminLeagueDTO'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.errorResponse'
      security:
      - BearerAuth: []
      summary: Создать чемпионат
      tags:
      - admin
  /admin/leagues/{id}:
    delete:
      description: Удаляет чемпионат. Если к нему привязаны события — 409 conflict.
      parameters:
      - description: ID чемпионата
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/handler.errorResponse'
      security:
      - BearerAuth: []
      summary: Удалить чемпионат
      tags:
      - admin
    patch:
      consumes:
      - application/json
      description: Правит name и/или sport_slug чемпионата. Оба поля опциональны.
      parameters:
      - description: ID чемпионата
        in: path
        name: id
        required: true
        type: integer
      - description: Поля для обновления
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.editLeagueRequest'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.errorResponse'
      security:
      - BearerAuth: []
      summary: Редактировать чемпионат
      tags:
      - admin
  /admin/matches:
    post:
      consumes:
      - application/json
      description: Создаёт матч (source='manual') с командами, ссылкой на чемпионат
        и рынками ML/TOTALS с коэффициентами в одной транзакции. Расчёт — по введённому
        позже счёту.
      parameters:
      - description: Параметры матча
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.createMatchRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/handler.createEventResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.errorResponse'
      security:
      - BearerAuth: []
      summary: Создать спортивный матч
      tags:
      - admin
  /admin/matches/{id}:
    patch:
      consumes:
      - application/json
      description: Правит title/starts_at/home/away/league_id и коэффициенты исходов
        или отменяет матч (status='cancelled' → void ставок). Только для source='manual',
        status='upcoming'.
      parameters:
      - description: ID матча
        in: path
        name: id
        required: true
        type: integer
      - description: Поля для обновления
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.editMatchRequest'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.errorResponse'
      security:
      - BearerAuth: []
      summary: Редактировать матч
      tags:
      - admin
  /admin/matches/{id}/scores:
    post:
      consumes:
      - application/json
      description: Вводит финальный счёт {home, away} и запускает расчёт ML+TOTALS
        (SettleEvent по scores). Только для source='manual', status upcoming/live,
        пока счёт не введён.
      parameters:
      - description: ID матча
        in: path
        name: id
        required: true
        type: integer
      - description: Финальный счёт
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.matchScoresRequest'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.errorResponse'
      security:
      - BearerAuth: []
      summary: Ввести счёт и рассчитать матч
      tags:
      - admin
  /admin/matches/{id}/status:
    post:
      consumes:
      - application/json
      description: 'Ручной перевод upcoming → live (рынки → suspended, ставки закрываются).
        Единственное поддерживаемое значение status: live.'
      parameters:
      - description: ID матча
        in: path
        name: id
        required: true
        type: integer
      - description: Целевой статус
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.matchStatusRequest'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.errorResponse'
      security:
      - BearerAuth: []
      summary: Перевести статус матча
      tags:
      - admin
  /admin/users/{id}/adjust:
    post:
      consumes:
      - application/json
      description: Меняет баланс пользователя на amount (может быть отрицательным)
        в транзакции с FOR UPDATE. reason пишется в лог сервера.
      parameters:
      - description: ID пользователя
        in: path
        name: id
        required: true
        type: integer
      - description: Сумма и причина
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.adjustRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.adjustResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.errorResponse'
      security:
      - BearerAuth: []
      summary: Скорректировать баланс
      tags:
      - admin
  /auth/{provider}/callback:
    get:
      description: Вызывается провайдером после авторизации. Ставит refresh-cookie
        и редиректит браузер в SPA (302). Swagger "Try it out" здесь не работает —
        эндпоинт вызывается браузером, а не напрямую.
      parameters:
      - description: 'Провайдер: yandex или vk'
        in: path
        name: provider
        required: true
        type: string
      - description: Код авторизации от провайдера
        in: query
        name: code
        required: true
        type: string
      - description: CSRF-state (должен совпасть с cookie)
        in: query
        name: state
        required: true
        type: string
      responses:
        "302":
          description: Found
      summary: OAuth — callback от провайдера
      tags:
      - auth
  /auth/{provider}/login:
    get:
      description: 'Начало OAuth-флоу: перенаправляет на страницу авторизации Яндекс
        или VK. Значения provider: yandex, vk.'
      parameters:
      - description: 'Провайдер: yandex или vk'
        in: path
        name: provider
        required: true
        type: string
      responses:
        "302":
          description: Found
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.errorResponse'
      summary: OAuth — редирект к провайдеру
      tags:
      - auth
  /auth/login:
    post:
      consumes:
      - application/json
      description: Проверяет email+пароль, возвращает access-токен; refresh-токен
        — в httpOnly-cookie.
      parameters:
      - description: Учётные данные
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.loginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.tokenResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.errorResponse'
      summary: Вход
      tags:
      - auth
  /auth/logout:
    post:
      consumes:
      - application/json
      description: Отзывает refresh-токен и очищает cookie. Идемпотентно.
      parameters:
      - description: Refresh-токен (опционально, если нет cookie)
        in: body
        name: body
        schema:
          $ref: '#/definitions/handler.refreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.errorResponse'
      summary: Выход
      tags:
      - auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: Берёт refresh-токен из httpOnly-cookie (или из тела) и выдаёт новый
        access-токен.
      parameters:
      - description: Refresh-токен (опционально, если нет cookie)
        in: body
        name: body
        schema:
          $ref: '#/definitions/handler.refreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.tokenResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.errorResponse'
      summary: Обновление access-токена
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Создаёт пользователя, кошелёк и начисляет signup-бонус. Возвращает
        access-токен; refresh-токен — в httpOnly-cookie.
      parameters:
      - description: Данные регистрации
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.registerRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.tokenResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.errorResponse'
      summary: Регистрация
      tags:
      - auth
  /bets:
    post:
      consumes:
      - application/json
      description: 'Создаёт ставку на исход: проверяет рынок/событие, блокирует кошелёк
        (FOR UPDATE), списывает фантики и фиксирует коэффициент в одной транзакции.'
      parameters:
      - description: Параметры ставки
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.placeBetRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/handler.placeBetResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.errorResponse'
      security:
      - BearerAuth: []
      summary: Разместить ставку
      tags:
      - bets
  /events:
    get:
      description: Страница событий с рынками и текущими коэффициентами. Фильтры sport/status/league_id/q
        опциональны.
      parameters:
      - description: Фильтр по виду спорта (sport_slug)
        in: query
        name: sport
        type: string
      - description: Фильтр по источнику
        enum:
        - oddsapi
        - manual
        - custom
        in: query
        name: source
        type: string
      - description: Фильтр по статусу
        enum:
        - upcoming
        - live
        - settled
        - cancelled
        in: query
        name: status
        type: string
      - description: Фильтр по чемпионату (id)
        in: query
        name: league_id
        type: integer
      - description: Только популярные события (сортировка по дате добавления в популярное)
        in: query
        name: featured
        type: boolean
      - description: Поиск по названию события
        in: query
        name: q
        type: string
      - default: 1
        description: Номер страницы (с 1)
        in: query
        name: page
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.eventsResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.errorResponse'
      summary: Лента событий
      tags:
      - events
  /events/{id}:
    get:
      description: Событие со всеми рынками и исходами (текущие коэффициенты).
      parameters:
      - description: ID события
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.eventDTO'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.errorResponse'
      summary: Событие
      tags:
      - events
  /leaderboard:
    get:
      description: Топ прогнозистов по прибыли или ROI за период. Результат кэшируется
        на 60 секунд.
      parameters:
      - default: all
        description: Период
        enum:
        - week
        - month
        - all
        in: query
        name: period
        type: string
      - default: profit
        description: Метрика сортировки
        enum:
        - profit
        - roi
        in: query
        name: metric
        type: string
      - default: 1
        description: Номер страницы (с 1)
        in: query
        name: page
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.leaderboardResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.errorResponse'
      summary: Лидерборд
      tags:
      - leaderboard
  /leagues:
    get:
      description: Список чемпионатов (лиг) для фильтра ленты. Параметр sport_slug
        опционален.
      parameters:
      - description: Фильтр по виду спорта (sport_slug)
        in: query
        name: sport_slug
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.leaguesResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.errorResponse'
      summary: Чемпионаты
      tags:
      - events
  /me:
    get:
      description: Возвращает профиль текущего пользователя и баланс кошелька.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.meResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.errorResponse'
      security:
      - BearerAuth: []
      summary: Мой профиль
      tags:
      - me
    patch:
      consumes:
      - application/json
      description: Частично обновляет профиль. Незаданные поля сохраняют текущее значение.
        Возвращает обновлённый профиль с балансом.
      parameters:
      - description: Поля для обновления
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.updateProfileRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.meResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.errorResponse'
      security:
      - BearerAuth: []
      summary: Обновить профиль
      tags:
      - me
  /me/bets:
    get:
      description: Страница ставок текущего пользователя (новые — первыми), размер
        страницы 50. Фильтр по статусу опционален.
      parameters:
      - description: Фильтр по статусу
        enum:
        - pending
        - won
        - lost
        - void
        in: query
        name: status
        type: string
      - default: 1
        description: Номер страницы (с 1)
        in: query
        name: page
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.betsResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.errorResponse'
      security:
      - BearerAuth: []
      summary: Мои ставки
      tags:
      - bets
  /me/transactions:
    get:
      description: Страница журнала движений фантиков (новые — первыми), размер страницы
        50.
      parameters:
      - default: 1
        description: Номер страницы (с 1)
        in: query
        name: page
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.transactionsResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.errorResponse'
      security:
      - BearerAuth: []
      summary: История транзакций
      tags:
      - me
  /sports:
    get:
      description: Список видов спорта, по которым есть события в БД (всегда включает
        custom).
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.sportsResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.errorResponse'
      summary: Виды спорта
      tags:
      - events
  /users/{id}:
    get:
      description: Профиль пользователя и агрегированная статистика по ставкам (всего,
        winrate, profit, ROI).
      parameters:
      - description: ID пользователя
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.publicProfileDTO'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.errorResponse'
      summary: Публичный профиль
      tags:
      - users
  /users/{id}/bets:
    get:
      description: Страница ставок пользователя (новые — первыми), размер страницы
        50. Фильтр по статусу опционален.
      parameters:
      - description: ID пользователя
        in: path
        name: id
        required: true
        type: integer
      - description: Фильтр по статусу
        enum:
        - pending
        - won
        - lost
        - void
        in: query
        name: status
        type: string
      - default: 1
        description: Номер страницы (с 1)
        in: query
        name: page
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.userBetsResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.errorResponse'
      summary: Ставки пользователя
      tags:
      - users
securityDefinitions:
  BearerAuth:
    description: 'Введите access-токен в формате: Bearer <access_token>'
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
